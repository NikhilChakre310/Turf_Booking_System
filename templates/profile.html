{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-header text-white text-center py-4 rounded-top-4" style="background: linear-gradient(135deg, #333545, #1a1b23);">
                <h3 class="m-0 fw-bold">My Profile</h3>
                <p class="mb-0 mt-1 opacity-75">Manage your account and rewards</p>
            </div>
            <div class="card-body p-4">
                
                <!-- Loyalty Rewards Card -->
                <div class="bg-light rounded p-3 mb-4 border d-flex align-items-center justify-content-between">
                    <div>
                        <h6 class="fw-bold text-uppercase text-muted mb-1">Total Reward Points</h6>
                        <h3 class="fw-bold text-warning m-0">🪙 {{ user.loyalty_points }}</h3>
                        <small class="text-muted">Earn points on every booking!</small>
                    </div>
                    <div class="fs-1">🏆</div>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Full Name</label>
                        <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Email Address</label>
                        <input type="email" class="form-control bg-light" value="{{ user.email }}" disabled>
                        <small class="text-muted" style="font-size: 0.75rem;">Email cannot be changed.</small>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Phone Number</label>
                        <input type="tel" class="form-control" name="phone" value="{{ user.phone if user.phone else '' }}" placeholder="Enter 10-digit number">
                    </div>
                    <button type="submit" class="btn bms-btn w-100 btn-lg">Save Profile Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
