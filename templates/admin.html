{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4 fw-bold">Admin Dashboard</h2>

<div class="row">
    <!-- Add Turf Form -->
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header text-white fw-bold" style="background-color: #333545;">Add New Turf</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-2">
                        <label class="small fw-bold text-muted">Turf Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-2">
                        <label class="small fw-bold text-muted">Sport</label>
                        <input type="text" class="form-control" name="sport" placeholder="e.g. Football" required>
                    </div>
                    <div class="mb-2">
                        <label class="small fw-bold text-muted">Price / Hr (₹)</label>
                        <input type="number" class="form-control" name="price" required>
                    </div>
                    <div class="mb-2">
                        <label class="small fw-bold text-muted">Image URL</label>
                        <input type="url" class="form-control" name="image" placeholder="https://..." required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Description</label>
                        <textarea class="form-control" name="description" rows="2" required></textarea>
                    </div>
                    <button type="submit" class="btn bms-btn w-100">Add Turf</button>
                </form>
            </div>
        </div>
    </div>

    <!-- All Bookings -->
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white fw-bold border-bottom">All Platform Bookings</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover m-0 align-middle">
                        <thead class="bg-light">
                            <tr>
                                <th class="px-3">User</th>
                                <th>Turf</th>
                                <th>Date</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for b in bookings %}
                            <tr>
                                <td class="px-3 fw-bold">{{ b.user_name }}</td>
                                <td>{{ b.turf_name }}</td>
                                <td>{{ b.date }}</td>
                                <td>{{ b.time_slot }}</td>
                            </tr>
                            {% else %}
                            <tr><td colspan="4" class="text-center py-4 text-muted">No bookings yet.</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
