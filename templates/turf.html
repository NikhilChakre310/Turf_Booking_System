{% extends 'base.html' %}

{% block content %}
<div class="row bg-white p-4 rounded shadow-sm mb-5">
    <div class="col-md-7 mb-4 mb-md-0">
        <img src="{{ turf.image }}" alt="{{ turf.name }}" class="img-fluid rounded shadow-sm w-100" style="max-height: 400px; object-fit: cover;">
    </div>
    <div class="col-md-5 d-flex flex-column justify-content-center">
        <span class="badge-sport d-inline-block mb-2 w-auto">{{ turf.sport }}</span>
        <h1 class="fw-bold">{{ turf.name }}</h1>
        <h3 class="bms-text mt-2">₹{{ turf.price }} <small class="text-muted fs-6">/ hour</small></h3>
        <p class="mt-3 text-secondary">{{ turf.description }}</p>
        <hr>
        
        <h5 class="fw-bold mb-3">Book Tickets</h5>
        <form method="POST">
            <div class="row">
                <div class="col-6 mb-3">
                    <label for="date" class="form-label text-muted small fw-bold text-uppercase">Select Date</label>
                    <input type="date" class="form-control" name="date" id="date" required min="{{ today }}">
                </div>
                <div class="col-6 mb-3">
                    <label for="time_slot" class="form-label text-muted small fw-bold text-uppercase">Time Slot</label>
                    <select class="form-select" name="time_slot" required>
                        <option value="" disabled selected>Choose slot</option>
                        {% for slot in time_slots %}
                            <option value="{{ slot }}">{{ slot }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="alert bg-light border mt-2 py-2 small">
                <i class="fw-bold">Payment Mode:</i> Pay at Venue.
            </div>

            <button type="submit" class="btn bms-btn btn-lg w-100 mt-2">Confirm Booking</button>
            <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">By booking, you agree to our 24-hour cancellation policy.</p>
        </form>
    </div>
</div>
{% endblock %}
