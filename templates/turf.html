{% extends 'base.html' %}

{% block content %}
<div class="row bg-white p-4 rounded shadow-sm">
    <div class="col-md-6">
        <img src="{{ turf.image }}" alt="{{ turf.name }}" class="img-fluid rounded mb-3">
    </div>
    <div class="col-md-6">
        <h2 class="fw-bold">{{ turf.name }}</h2>
        <span class="badge bg-success mb-2 fs-6">{{ turf.sport }}</span>
        <h4 class="text-primary mt-2">₹{{ turf.price }} <small class="text-muted fs-6">/ hour</small></h4>
        <p class="mt-3">{{ turf.description }}</p>
        <hr>
        
        <h4>Book this Turf</h4>
        <form method="POST">
            <div class="mb-3">
                <label for="date" class="form-label">Select Date</label>
                <input type="date" class="form-control" name="date" id="date" required min="{{ today }}">
            </div>
            <div class="mb-3">
                <label for="time_slot" class="form-label">Select Time Slot</label>
                <select class="form-select" name="time_slot" required>
                    <option value="" disabled selected>Choose a slot</option>
                    {% for slot in time_slots %}
                        <option value="{{ slot }}">{{ slot }}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">Note: The system will block double booking upon submission.</small>
            </div>
            
            <!-- Dummy Payment Area -->
            <div class="alert alert-info mt-3">
                <strong>Payment Mode:</strong> Pay at Venue.
            </div>

            <button type="submit" class="btn btn-success w-100">Confirm Booking</button>
        </form>
    </div>
</div>
{% endblock %}
