{% extends 'base.html' %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-6">
        <h2>Find & Book Turfs Near You</h2>
    </div>
    <div class="col-md-6">
        <form action="/" method="GET" class="d-flex">
            <input type="text" name="search" class="form-control me-2" placeholder="Search by name or sport (e.g. Cricket)">
            <button type="submit" class="btn btn-success">Search</button>
        </form>
    </div>
</div>

<div class="row">
    {% for turf in turfs %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <img src="{{ turf.image }}" class="card-img-top" alt="{{ turf.name }}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title">{{ turf.name }}</h5>
                <p class="card-text text-muted mb-1">{{ turf.sport }}</p>
                <p class="card-text fw-bold text-success">₹{{ turf.price }} / hour</p>
                <a href="/turf/{{ turf.id }}" class="btn btn-outline-success w-100">View Details & Book</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center">
        <p class="text-muted">No turfs found.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
